<mat-toolbar class="app-toolbar">
  <mat-icon aria-hidden="true">grid_4x4</mat-icon>
  <span class="app-name">{{ appName() }}</span>
  @if (store.title(); as docTitle) {
    <span class="app-doc-title" [title]="docTitle">{{ docTitle }}</span>
  }

  <span class="toolbar-spacer"></span>

  <button
    matIconButton
    [matTooltip]="themeTooltip()"
    [attr.aria-label]="themeTooltip()"
    (click)="theme.cycle()"
  >
    <mat-icon>{{ theme.icon() }}</mat-icon>
  </button>

  <mat-button-toggle-group
    class="lang-toggle"
    hideSingleSelectionIndicator
    [value]="i18n.lang()"
    (change)="i18n.setLang($event.value)"
    [attr.aria-label]="'toolbar.language' | t"
  >
    <mat-button-toggle value="it">IT</mat-button-toggle>
    <mat-button-toggle value="en">EN</mat-button-toggle>
  </mat-button-toggle-group>

  <a
    class="github-link"
    href="https://github.com/leolmi/crosstitch"
    target="_blank"
    rel="noopener noreferrer"
    [attr.aria-label]="'toolbar.github' | t"
  >
    <svg
      class="github-icon"
      viewBox="0 0 16 16"
      width="26"
      height="26"
      aria-hidden="true"
    >
      <path
        fill="currentColor"
        d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"
      />
    </svg>
  </a>
</mat-toolbar>

<main class="app-content">
  <router-outlet />
</main>
