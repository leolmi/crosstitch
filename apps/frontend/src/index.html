<!doctype html>
<!-- lang statico in inglese (versione indicizzata da Google); I18nService lo
     aggiorna a runtime sulla lingua attiva -->
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Crosstitch - Online Cross Stitch Pattern Maker | Design & Embroider</title>
    <base href="/" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="Turn your images into cross stitch patterns: edit the picture, pick DMC or Anchor floss colours and download a PDF with symbol chart and floss list. Free, no sign-up."
    />
    <link rel="canonical" href="https://crosstitch.app/" />

    <!-- Open Graph / Twitter: letti dai bot social, che non eseguono JavaScript -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Crosstitch" />
    <meta property="og:url" content="https://crosstitch.app/" />
    <meta
      property="og:title"
      content="Crosstitch - Online Cross Stitch Pattern Maker | Design & Embroider"
    />
    <meta
      property="og:description"
      content="Turn your images into cross stitch patterns: edit the picture, pick DMC or Anchor floss colours and download a PDF with symbol chart and floss list. Free, no sign-up."
    />
    <meta property="og:locale" content="en_US" />
    <meta property="og:locale:alternate" content="it_IT" />
    <meta property="og:image" content="https://crosstitch.app/og-image.png" />
    <meta property="og:image:width" content="2400" />
    <meta property="og:image:height" content="1260" />
    <meta
      property="og:image:alt"
      content="Crosstitch - Turn your images into cross stitch patterns"
    />
    <meta name="twitter:card" content="summary_large_image" />

    <!-- Dati strutturati per i motori di ricerca -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebApplication",
        "name": "Crosstitch",
        "url": "https://crosstitch.app/",
        "description": "Free online cross stitch pattern maker: turn images into embroidery charts with DMC or Anchor floss colours and export a printable PDF with symbol chart and floss list.",
        "applicationCategory": "DesignApplication",
        "operatingSystem": "Any",
        "browserRequirements": "Requires JavaScript",
        "inLanguage": ["en", "it"],
        "offers": { "@type": "Offer", "price": "0", "priceCurrency": "EUR" }
      }
    </script>

    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/icon?family=Material+Icons"
      rel="stylesheet"
    />
  </head>
  <body>
    <app-root></app-root>
  </body>
</html>
